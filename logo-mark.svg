<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MatchYard">
  <defs>
    <linearGradient id="myGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C6FF00"/>
      <stop offset="1" stop-color="#00E5C3"/>
    </linearGradient>
  </defs>
  <!-- "M" — white angular double-peak -->
  <path d="M86 360 L156 156 L222 286 L288 156 L356 360"
