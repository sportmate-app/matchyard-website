<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MatchYard — Icon Concepts</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#04071A;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:48px 24px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  .page{text-align:center;width:100%}
  .page h1{color:#F0F5FF;font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.4rem}
  .page p{color:#5A7090;font-size:.88rem;margin-bottom:52px}
  .grid{display:flex;gap:56px;justify-content:center;flex-wrap:wrap;align-items:flex-start}
  .option{display:flex;flex-direction:column;align-items:center;gap:18px}
  .ring{
    position:relative;border-radius:40px;padding:3px;
    background:linear-gradient(135deg,#CCFF44 0%,#AAFF00 28%,#00D4FF 62%,#0055FF 100%);
    box-shadow:0 0 40px rgba(170,255,0,.40),0 0 100px rgba(170,255,0,.16),0 28px 80px rgba(0,0,0,.92);
  }
  .lbl{color:#7A90B4;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
  .sub{color:#3A5070;font-size:.68rem;margin-top:3px}
  .badge{
    display:inline-block;margin-bottom:16px;padding:.25rem .7rem;
    border-radius:999px;border:1px solid rgba(170,255,0,.28);
    background:rgba(170,255,0,.07);color:#AAFF00;
    font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="page">
  <div class="badge">MatchYard — Icon Preview</div>
  <h1>Three Premium Concepts</h1>
  <p>Navy + Green · High-End · Choose your direction</p>

  <div class="grid">

    <!-- ══════════ CONCEPT A — Dual-Player Shield ══════════ -->
    <div class="option">
      <div class="ring">
        <svg width="168" height="168" viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="bgA" cx="38%" cy="22%" r="78%">
              <stop offset="0%" stop-color="#122248"/>
              <stop offset="60%" stop-color="#07102A"/>
              <stop offset="100%" stop-color="#04071A"/>
            </radialGradient>
            <linearGradient id="fgA" x1="0%" y1="0%" x2="80%" y2="100%">
              <stop offset="0%" stop-color="#80FFB8"/>
              <stop offset="42%" stop-color="#00CC78"/>
              <stop offset="100%" stop-color="#AAFF00"/>
            </linearGradient>
            <linearGradient id="accentA" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#AAFF00"/>
              <stop offset="100%" stop-color="#00E5C8"/>
            </linearGradient>
            <filter id="glA" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glA2" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <linearGradient id="shineA" x1="0%" y1="0%" x2="80%" y2="100%">
              <stop offset="0%" stop-color="rgba(255,255,255,.13)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
            </linearGradient>
          </defs>
          <!-- Background -->
          <rect width="168" height="168" rx="38" fill="url(#bgA)"/>
          <!-- Subtle court/field lines -->
          <ellipse cx="84" cy="100" rx="52" ry="32" fill="none" stroke="rgba(170,255,0,.06)" stroke-width="1.5"/>
          <line x1="84" y1="36" x2="84" y2="148" stroke="rgba(170,255,0,.05)" stroke-width="1"/>
          <!-- Connection glow between hands -->
          <ellipse cx="84" cy="52" rx="18" ry="10" fill="rgba(170,255,0,.18)" filter="url(#glA)"/>
          <!-- ── Left figure ── -->
          <g filter="url(#glA2)">
            <!-- head -->
            <circle cx="56" cy="56" r="14" fill="url(#fgA)"/>
            <!-- body -->
            <rect x="48" y="70" width="16" height="32" rx="8" fill="url(#fgA)"/>
            <!-- right arm raised to center -->
            <path d="M64 80 C 70 66, 76 57, 82 50" stroke="url(#fgA)" stroke-width="11" fill="none" stroke-linecap="round"/>
            <!-- left arm out -->
            <path d="M48 80 C 40 76, 34 78, 28 82" stroke="url(#fgA)" stroke-width="10" fill="none" stroke-linecap="round"/>
            <!-- legs -->
            <path d="M52 102 L 46 130" stroke="url(#fgA)" stroke-width="12" stroke-linecap="round"/>
            <path d="M60 102 L 66 130" stroke="url(#fgA)" stroke-width="12" stroke-linecap="round"/>
          </g>
          <!-- ── Right figure (mirror) ── -->
          <g filter="url(#glA2)" transform="translate(168,0) scale(-1,1)">
            <circle cx="56" cy="56" r="14" fill="url(#fgA)"/>
            <rect x="48" y="70" width="16" height="32" rx="8" fill="url(#fgA)"/>
            <path d="M64 80 C 70 66, 76 57, 82 50" stroke="url(#fgA)" stroke-width="11" fill="none" stroke-linecap="round"/>
            <path d="M48 80 C 40 76, 34 78, 28 82" stroke="url(#fgA)" stroke-width="10" fill="none" stroke-linecap="round"/>
            <path d="M52 102 L 46 130" stroke="url(#fgA)" stroke-width="12" stroke-linecap="round"/>
            <path d="M60 102 L 66 130" stroke="url(#fgA)" stroke-width="12" stroke-linecap="round"/>
          </g>
          <!-- Center connection node -->
          <circle cx="84" cy="50" r="9" fill="#AAFF00" filter="url(#glA)"/>
          <circle cx="84" cy="50" r="5" fill="#FFFFFF"/>
          <!-- Top glass sheen -->
          <ellipse cx="74" cy="40" rx="62" ry="30" fill="url(#shineA)"/>
          <!-- Border rim -->
          <rect width="168" height="168" rx="38" fill="none" stroke="rgba(170,255,0,.20)" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="lbl">A · Players Connect</div>
      <div class="sub">Dynamic duo forming M — brand mark</div>
    </div>

    <!-- ══════════ CONCEPT B — Bold M Volt ══════════ -->
    <div class="option">
      <div class="ring">
        <svg width="168" height="168" viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="bgB" cx="50%" cy="28%" r="74%">
              <stop offset="0%" stop-color="#0C1E48"/>
              <stop offset="55%" stop-color="#060F28"/>
              <stop offset="100%" stop-color="#04071A"/>
            </radialGradient>
            <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="110%">
              <stop offset="0%" stop-color="#DDFF66"/>
              <stop offset="38%" stop-color="#AAFF00"/>
              <stop offset="72%" stop-color="#66DD00"/>
              <stop offset="100%" stop-color="#00AA55"/>
            </linearGradient>
            <linearGradient id="mGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="rgba(255,255,255,.22)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
            </linearGradient>
            <filter id="glB" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glB2" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect width="168" height="168" rx="38" fill="url(#bgB)"/>
          <!-- Glow halo behind M -->
          <ellipse cx="84" cy="90" rx="56" ry="48" fill="rgba(170,255,0,.07)" filter="url(#glB)"/>
          <!-- Bold M letterform -->
          <g filter="url(#glB2)">
            <path d="
              M 24 132
              L 24 38
              L 42 38
              L 84 92
              L 126 38
              L 144 38
              L 144 132
              L 126 132
              L 126 70
              L 93 110
              L 75 110
              L 42 70
              L 42 132
              Z
            " fill="url(#mGrad)"/>
          </g>
          <!-- Metallic top edge highlight on M -->
          <path d="M 24 38 L 42 38 L 84 92 L 126 38 L 144 38" stroke="rgba(255,255,255,.30)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
          <!-- Volt accent bar at bottom -->
          <rect x="24" y="132" width="120" height="3.5" rx="2" fill="rgba(170,255,0,.35)" filter="url(#glB)"/>
          <!-- Top glass sheen -->
          <ellipse cx="76" cy="40" rx="60" ry="26" fill="rgba(255,255,255,.07)"/>
          <rect width="168" height="168" rx="38" fill="none" stroke="rgba(170,255,0,.18)" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="lbl">B · Volt M Strike</div>
      <div class="sub">Bold geometric lettermark · Maximum impact</div>
    </div>

    <!-- ══════════ CONCEPT C — Abstract Court Diamond ══════════ -->
    <div class="option">
      <div class="ring">
        <svg width="168" height="168" viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="bgC" cx="42%" cy="26%" r="78%">
              <stop offset="0%" stop-color="#102040"/>
              <stop offset="65%" stop-color="#070E24"/>
              <stop offset="100%" stop-color="#04071A"/>
            </radialGradient>
            <linearGradient id="dotC" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#CCFF55"/>
              <stop offset="100%" stop-color="#00CC78"/>
            </linearGradient>
            <linearGradient id="arcC" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#AAFF00"/>
              <stop offset="100%" stop-color="#00E5C8"/>
            </linearGradient>
            <filter id="glC" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glC2" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect width="168" height="168" rx="38" fill="url(#bgC)"/>
          <!-- Outer court diamond -->
          <path d="M 84 20 L 148 84 L 84 148 L 20 84 Z"
                stroke="rgba(170,255,0,.14)" stroke-width="1.5" fill="none"/>
          <!-- Mid court line -->
          <line x1="20" y1="84" x2="148" y2="84"
                stroke="rgba(170,255,0,.08)" stroke-width="1" stroke-dasharray="5,8"/>
          <!-- Center circle -->
          <circle cx="84" cy="84" r="22" fill="none"
                  stroke="rgba(170,255,0,.10)" stroke-width="1.5"/>

          <!-- Left player glow -->
          <circle cx="50" cy="84" r="20" fill="rgba(170,255,0,.12)" filter="url(#glC)"/>
          <!-- Right player glow -->
          <circle cx="118" cy="84" r="20" fill="rgba(170,255,0,.12)" filter="url(#glC)"/>

          <!-- Left player body -->
          <g filter="url(#glC2)">
            <circle cx="50" cy="70" r="11" fill="url(#dotC)"/>
            <rect x="43" y="81" width="14" height="22" rx="7" fill="url(#dotC)"/>
            <!-- arm reaching right -->
            <path d="M57 88 Q68 80 74 76" stroke="url(#dotC)" stroke-width="9" fill="none" stroke-linecap="round"/>
          </g>

          <!-- Right player body (mirror) -->
          <g filter="url(#glC2)" transform="translate(168,0) scale(-1,1)">
            <circle cx="50" cy="70" r="11" fill="url(#dotC)"/>
            <rect x="43" y="81" width="14" height="22" rx="7" fill="url(#dotC)"/>
            <path d="M57 88 Q68 80 74 76" stroke="url(#dotC)" stroke-width="9" fill="none" stroke-linecap="round"/>
          </g>

          <!-- Connection spark at center -->
          <circle cx="84" cy="78" r="8" fill="rgba(170,255,0,.22)" filter="url(#glC)"/>
          <circle cx="84" cy="78" r="5" fill="#AAFF00" filter="url(#glC2)"/>
          <circle cx="84" cy="78" r="2.5" fill="#FFFFFF"/>

          <!-- Top glass sheen -->
          <ellipse cx="74" cy="36" rx="58" ry="26" fill="rgba(255,255,255,.06)"/>
          <rect width="168" height="168" rx="38" fill="none" stroke="rgba(170,255,0,.18)" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="lbl">C · Court Match</div>
      <div class="sub">Two players on field connecting · Abstract sport</div>
    </div>

  </div>
</div>
</body>
</html>
