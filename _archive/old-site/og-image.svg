<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MatchYard — Find your game. Find your people.">
  <defs>
    <linearGradient id="myGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#00E5C3"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0" stop-color="#1B2330"/>
      <stop offset="1" stop-color="#0A1120"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A1120"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark (scaled from 512 master), centered above the wordmark -->
  <g transform="translate(444,96) scale(0.62)">
    <path d="M86 360 L156 156 L222 286 L288 156 L356 360"
          fill="none" stroke="#F2F4F7" stroke-width="56"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M326 160 L382 250 L438 160 M382 250 L382 360"
          fill="none" stroke="url(#myGrad)" stroke-width="56"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="430" text-anchor="middle"
        font-family="'Space Grotesk', 'Arial', sans-serif"
        font-size="116" font-weight="700" letter-spacing="6" fill="#F2F4F7">MATCHYARD</text>

  <!-- Tagline -->
  <text x="600" y="510" text-anchor="middle"
        font-family="'Space Grotesk', 'Arial', sans-serif"
        font-size="40" font-weight="500" letter-spacing="1" fill="#9BA6B8">Find your game. Find your people.</text>
</svg>
