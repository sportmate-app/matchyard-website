<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 54" width="180" height="54" role="img" aria-label="Get it on Google Play">
  <defs>
    <linearGradient id="gp-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00C3FF"/><stop offset="1" stop-color="#00A0EE"/>
    </linearGradient>
    <linearGradient id="gp-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00E36C"/><stop offset="1" stop-color="#00C257"/>
    </linearGradient>
    <linearGradient id="gp-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF4B47"/><stop offset="1" stop-color="#E33E3A"/>
    </linearGradient>
    <linearGradient id="gp-yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD500"/><stop offset="1" stop-color="#FFBC00"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="179" height="53" rx="11" fill="#000000" stroke="#3A3A3C" stroke-width="1"/>
  <!-- Play triangle (4-color, split at the centre vertex) -->
  <g transform="translate(17,14)">
    <!-- centre point of the play button -->
    <!-- left spine at x=0; tip vertices at right -->
    <path d="M0 0 L11 11 L0 22 Z" fill="url(#gp-blue)"/>
    <path d="M0 0 L11 11 L18 7 Z" fill="url(#gp-red)"/>
    <path d="M0 22 L11 11 L18 15 Z" fill="url(#gp-yellow)"/>
    <path d="M0 0 L7 4 L7 18 L0 22 Z" fill="url(#gp-green)"/>
  </g>
  <!-- Text -->
  <text x="46" y="20" fill="#FFFFFF" font-family="'Roboto','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="400" letter-spacing="0.5">GET IT ON</text>
  <text x="46" y="40" fill="#FFFFFF" font-family="'Roboto','Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="500" letter-spacing="-0.2">Google Play</text>
</svg>
